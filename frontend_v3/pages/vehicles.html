<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý xe - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-car-front-fill"></i> Smart Parking</h4>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="register-card.html" class="nav-link">
                <i class="bi bi-credit-card-2-front"></i> Đăng ký thẻ
            </a>
            <a href="customers.html" class="nav-link">
                <i class="bi bi-people"></i> Khách hàng
            </a>
            <a href="vehicles.html" class="nav-link active">
                <i class="bi bi-car-front"></i> Xe
            </a>
            <a href="parking-map.html" class="nav-link">
                <i class="bi bi-grid-3x3"></i> Map chỗ đỗ
            </a>
            <a href="packages.html" class="nav-link">
                <i class="bi bi-box-seam"></i> Gói cước
            </a>
            <a href="sessions.html" class="nav-link">
                <i class="bi bi-clock-history"></i> Lịch sử
            </a>
            <a href="revenue.html" class="nav-link">
                <i class="bi bi-graph-up"></i> Doanh thu
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2><i class="bi bi-car-front"></i> Quản lý xe</h2>
        </div>

        <!-- Search -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchInput" placeholder="Tìm theo biển số...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="typeFilter">
                            <option value="">Tất cả loại xe</option>
                            <option value="motorbike">Xe máy</option>
                            <option value="car">Ô tô</option>
                            <option value="bicycle">Xe đạp</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="loadVehicles()">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vehicles Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã xe</th>
                                <th>Biển số</th>
                                <th>Loại xe</th>
                                <th>Hãng</th>
                                <th>Màu</th>
                                <th>Chủ xe</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="vehiclesTable">
                            <tr>
                                <td colspan="8" class="text-center">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        async function loadVehicles() {
            const tbody = document.getElementById('vehiclesTable');
            
            try {
                const search = document.getElementById('searchInput')?.value || '';
                const type = document.getElementById('typeFilter')?.value || '';
                
                let url = '/vehicles';
                const params = [];
                if (search) params.push(`plate_number=${encodeURIComponent(search)}`);
                if (type) params.push(`vehicle_type=${type}`);
                if (params.length > 0) url += '?' + params.join('&');
                
                console.log('Loading vehicles from:', url);
                const result = await api.get(url);
                console.log('Vehicles result:', result);
                
                if (!result || !result.success) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">Lỗi tải dữ liệu. Kiểm tra backend đã chạy chưa.</td></tr>';
                    return;
                }
                
                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center">Không có dữ liệu</td></tr>';
                    return;
                }
                
                tbody.innerHTML = result.data.map(vehicle => `
                    <tr>
                        <td><code>${vehicle.vehicle_id}</code></td>
                        <td><strong>${vehicle.plate_number}</strong></td>
                        <td><span class="badge bg-info">${getVehicleTypeLabel(vehicle.vehicle_type)}</span></td>
                        <td>${vehicle.brand || 'N/A'}</td>
                        <td>${vehicle.color || 'N/A'}</td>
                        <td>${vehicle.customer_name || 'N/A'}</td>
                        <td><span class="badge bg-${vehicle.is_active ? 'success' : 'secondary'}">${vehicle.is_active ? 'Hoạt động' : 'Ngừng'}</span></td>
                        <td>
                            <span class="text-muted">Chưa hỗ trợ xóa</span>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading vehicles:', error);
                showToast('Không thể tải danh sách xe', 'danger');
            }
        }

        function getVehicleTypeLabel(type) {
            const labels = {
                'motorbike': 'Xe máy',
                'car': 'Ô tô',
                'bicycle': 'Xe đạp'
            };
            return labels[type] || type;
        }

        async function deleteVehicle(vehicleId) {
            if (!confirm('Bạn có chắc muốn xóa xe này?')) return;
            
            try {
                const result = await api.delete(`/vehicles/${vehicleId}`);
                if (result.success) {
                    showToast('Xóa thành công', 'success');
                    loadVehicles();
                }
            } catch (error) {
                showToast('Không thể xóa xe', 'danger');
            }
        }

        document.addEventListener('DOMContentLoaded', loadVehicles);
    </script>
</body>
</html>
