<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê doanh thu - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-car-front-fill"></i> Smart Parking</h4>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="register-card.html" class="nav-link">
                <i class="bi bi-credit-card-2-front"></i> Đăng ký thẻ
            </a>
            <a href="customers.html" class="nav-link">
                <i class="bi bi-people"></i> Khách hàng
            </a>
            <a href="vehicles.html" class="nav-link">
                <i class="bi bi-car-front"></i> Xe
            </a>
            <a href="parking-map.html" class="nav-link">
                <i class="bi bi-grid-3x3"></i> Map chỗ đỗ
            </a>
            <a href="packages.html" class="nav-link">
                <i class="bi bi-box-seam"></i> Gói cước
            </a>
            <a href="sessions.html" class="nav-link">
                <i class="bi bi-clock-history"></i> Lịch sử
            </a>
            <a href="revenue.html" class="nav-link active">
                <i class="bi bi-graph-up"></i> Doanh thu
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2><i class="bi bi-graph-up"></i> Thống kê doanh thu</h2>
        </div>

        <!-- Summary Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-success">
                        <i class="bi bi-cash-stack"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Hôm nay</div>
                        <div class="stat-value" id="todayRevenue">0đ</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-info">
                        <i class="bi bi-calendar-week"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Tuần này</div>
                        <div class="stat-value" id="weekRevenue">0đ</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-warning">
                        <i class="bi bi-calendar-month"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Tháng này</div>
                        <div class="stat-value" id="monthRevenue">0đ</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon bg-primary">
                        <i class="bi bi-graph-up-arrow"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">Tổng cộng</div>
                        <div class="stat-value" id="totalRevenue">0đ</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-3 mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="bi bi-bar-chart"></i> Doanh thu theo ngày</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="dailyRevenueChart" height="80"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="bi bi-pie-chart"></i> Theo loại gói</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="packageRevenueChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-receipt"></i> Giao dịch gần đây</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã GD</th>
                                <th>Khách hàng</th>
                                <th>Loại</th>
                                <th>Số tiền</th>
                                <th>Thời gian</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <tr>
                                <td colspan="5" class="text-center">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/revenue-chart.js"></script>
</body>
</html>
