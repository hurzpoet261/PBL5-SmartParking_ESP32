<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-car-front-fill"></i> Smart Parking</h4>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="register-card.html" class="nav-link">
                <i class="bi bi-credit-card-2-front"></i> Đăng ký thẻ
            </a>
            <a href="customers.html" class="nav-link active">
                <i class="bi bi-people"></i> Khách hàng
            </a>
            <a href="vehicles.html" class="nav-link">
                <i class="bi bi-car-front"></i> Xe
            </a>
            <a href="parking-map.html" class="nav-link">
                <i class="bi bi-grid-3x3"></i> Map chỗ đỗ
            </a>
            <a href="packages.html" class="nav-link">
                <i class="bi bi-box-seam"></i> Gói cước
            </a>
            <a href="sessions.html" class="nav-link">
                <i class="bi bi-clock-history"></i> Lịch sử
            </a>
            <a href="revenue.html" class="nav-link">
                <i class="bi bi-graph-up"></i> Doanh thu
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2><i class="bi bi-people"></i> Quản lý khách hàng</h2>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="window.location.href='register-card.html'">
                    <i class="bi bi-plus-circle"></i> Thêm khách hàng
                </button>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchInput" placeholder="Tìm theo tên, SĐT, email...">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="typeFilter">
                            <option value="">Tất cả loại</option>
                            <option value="walk_in">Khách vãng lai</option>
                            <option value="monthly">Khách tháng</option>
                            <option value="vip">VIP</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="loadCustomers()">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã KH</th>
                                <th>Họ tên</th>
                                <th>Số điện thoại</th>
                                <th>Email</th>
                                <th>Loại</th>
                                <th>Số xe</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="customersTable">
                            <tr>
                                <td colspan="8" class="text-center">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/customers.js"></script>
</body>
</html>
