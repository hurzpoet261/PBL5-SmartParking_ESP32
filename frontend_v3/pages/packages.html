<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý gói cước - Smart Parking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4><i class="bi bi-car-front-fill"></i> Smart Parking</h4>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="register-card.html" class="nav-link">
                <i class="bi bi-credit-card-2-front"></i> Đăng ký thẻ
            </a>
            <a href="customers.html" class="nav-link">
                <i class="bi bi-people"></i> Khách hàng
            </a>
            <a href="vehicles.html" class="nav-link">
                <i class="bi bi-car-front"></i> Xe
            </a>
            <a href="parking-map.html" class="nav-link">
                <i class="bi bi-grid-3x3"></i> Map chỗ đỗ
            </a>
            <a href="packages.html" class="nav-link active">
                <i class="bi bi-box-seam"></i> Gói cước
            </a>
            <a href="sessions.html" class="nav-link">
                <i class="bi bi-clock-history"></i> Lịch sử
            </a>
            <a href="revenue.html" class="nav-link">
                <i class="bi bi-graph-up"></i> Doanh thu
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2><i class="bi bi-box-seam"></i> Quản lý gói cước</h2>
        </div>

        <!-- Filter -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <select class="form-select" id="typeFilter">
                            <option value="">Tất cả loại gói</option>
                            <option value="per_use">Theo lượt</option>
                            <option value="daily">Theo ngày</option>
                            <option value="monthly">Theo tháng</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select" id="statusFilter">
                            <option value="">Tất cả trạng thái</option>
                            <option value="active">Đang hoạt động</option>
                            <option value="expired">Hết hạn</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary w-100" onclick="loadPackages()">
                            <i class="bi bi-search"></i> Tìm kiếm
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Packages Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Mã gói</th>
                                <th>Khách hàng</th>
                                <th>Biển số</th>
                                <th>Loại gói</th>
                                <th>Giá</th>
                                <th>Ngày bắt đầu</th>
                                <th>Ngày hết hạn</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="packagesTable">
                            <tr>
                                <td colspan="8" class="text-center">Đang tải...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        async function loadPackages() {
            const tbody = document.getElementById('packagesTable');
            
            try {
                const type = document.getElementById('typeFilter')?.value || '';
                const status = document.getElementById('statusFilter')?.value || '';
                
                let url = '/packages';
                const params = [];
                if (type) params.push(`package_type=${type}`);
                if (status) params.push(`status=${status}`);
                if (params.length > 0) url += '?' + params.join('&');
                
                console.log('Loading packages from:', url);
                const result = await api.get(url);
                console.log('Packages result:', result);
                
                if (!result || !result.success) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-danger">Lỗi tải dữ liệu. Kiểm tra backend đã chạy chưa.</td></tr>';
                    return;
                }
                
                if (!result.data || result.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center">Không có dữ liệu</td></tr>';
                    return;
                }
                
                tbody.innerHTML = result.data.map(pkg => `
                    <tr>
                        <td><code>${pkg.package_id}</code></td>
                        <td>${pkg.customer_name || 'N/A'}</td>
                        <td><strong>${pkg.plate_number || 'N/A'}</strong></td>
                        <td><span class="badge bg-info">${getPackageTypeLabel(pkg.package_type)}</span></td>
                        <td>${formatCurrency(pkg.price)}</td>
                        <td>${formatDate(pkg.start_date)}</td>
                        <td>${formatDate(pkg.end_date)}</td>
                        <td><span class="badge bg-${pkg.is_active ? 'success' : 'danger'}">${pkg.is_active ? 'Hoạt động' : 'Hết hạn'}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading packages:', error);
                showToast('Không thể tải danh sách gói cước', 'danger');
            }
        }

        function getPackageTypeLabel(type) {
            const labels = {
                'per_use': 'Theo lượt',
                'daily': 'Theo ngày',
                'monthly': 'Theo tháng'
            };
            return labels[type] || type;
        }

        document.addEventListener('DOMContentLoaded', loadPackages);
    </script>
</body>
</html>
